<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 150">
  <!-- Glowing shadow for the line -->
  <path d="M 280,35 L 230,35 L 180,95 L 140,95 L 120,120 L 100,95 L 70,95" 
        fill="none" stroke="#ea580c" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" filter="blur(6px)" />
  
  <!-- Main route line -->
  <path d="M 280,35 L 230,35 L 180,95 L 140,95 L 120,120 L 100,95 L 70,95" 
        fill="none" stroke="#ea580c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Endpoints -->
  <circle cx="280" cy="35" r="5" fill="#fff" stroke="#ea580c" stroke-width="2" />
  <circle cx="70" cy="95" r="5" fill="#ea580c" />

  <!-- Base Text -->
  <text x="175" y="90" font-family="'Inter', system-ui, sans-serif" font-size="64" font-weight="900" text-anchor="middle" letter-spacing="-2">
    <tspan fill="#f97316">RIDE</tspan><tspan fill="#ffffff">SYNC</tspan>
  </text>
</svg>
